name: Release

# Build, sign, and publish momPanel for Linux (AppImage) and Windows (NSIS) when a
# version tag is pushed. The Tauri action also generates and uploads `latest.json`,
# which the in-app updater reads from the GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # AppImage (self-updatable Linux bundle)
          - platform: windows-latest # NSIS installer (dev/test target)

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          notes=$(awk -v v="$ver" '$0 ~ "^## "v" " {f=1; next} /^## / {f=0} f {print}' CHANGELOG.md)
          if [ -z "$notes" ]; then notes="Release $GITHUB_REF_NAME."; fi
          {
            echo "body<<__EOF__"
            echo "$notes"
            echo ""
            echo "---"
            echo "Installs and updates automatically from this release. **Linux/Zorin:** download the AppImage (the self-updating bundle). **Windows:** run the \`_x64-setup.exe\`."
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "momPanel ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
