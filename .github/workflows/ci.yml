name: CI

# Compile and test the Rust backend on every PR and on pushes to main, so a broken
# build is caught before it reaches a release tag. Linux-only (the primary deploy
# target); the release workflow covers the Windows bundle.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Same Tauri system deps as release.yml (kept in sync — no libappindicator3-dev,
      # this app has no tray icon).
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
