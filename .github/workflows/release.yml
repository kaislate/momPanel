name: Release

# Build, sign, and publish momPanel for Linux (AppImage), Windows (NSIS), and macOS
# (universal .dmg/.app) when a version tag is pushed. The Tauri action also generates
# and uploads `latest.json`, which the in-app updater reads from the GitHub Release.
# NOTE: the macOS bundle is signed with the minisign updater key only — it is NOT
# Apple-notarized, so Gatekeeper blocks a double-click on first launch. Users must
# right-click the app -> Open the first time (this is called out in the release notes).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # AppImage (self-updatable Linux bundle)
          - platform: windows-latest # NSIS installer (dev/test target)
          # One universal .dmg/.app covering Intel + Apple Silicon in a single artifact.
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # The universal build compiles for both macOS arches, so both Rust std targets
      # must be installed before tauri-action runs.
      - name: Add macOS universal Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          notes=$(awk -v v="$ver" '$0 ~ "^## "v" " {f=1; next} /^## / {f=0} f {print}' CHANGELOG.md)
          if [ -z "$notes" ]; then notes="Release $GITHUB_REF_NAME."; fi
          {
            echo "body<<__EOF__"
            echo "$notes"
            echo ""
            echo "---"
            echo "Installs and updates automatically from this release. **Linux/Zorin:** download the AppImage (the self-updating bundle). **Windows:** run the \`_x64-setup.exe\`. **macOS:** open the \`.dmg\` and drag momPanel to Applications; on first launch right-click the app and choose **Open** (it isn't Apple-notarized yet)."
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "momPanel ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          # Empty on Linux/Windows; "--target universal-apple-darwin" on macOS.
          args: ${{ matrix.args }}
