<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memory warning</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        user-select: none;
        cursor: default;
      }
      #modal {
        box-sizing: border-box;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 18px;
        background: #d97706;
        color: #fff;
        text-align: center;
      }
      #icon { font-size: 34px; }
      #headline { font-size: 17px; font-weight: 700; }
      #sub { font-size: 13px; opacity: 0.95; }
      #actions { display: flex; gap: 10px; margin-top: 8px; }
      #actions button {
        font: inherit; font-size: 13px; font-weight: 600; color: inherit;
        background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.5);
        border-radius: 8px; padding: 8px 14px; cursor: pointer;
      }
      #actions button:hover { background: rgba(255,255,255,0.3); }
    </style>
  </head>
  <body>
    <div id="modal" role="alertdialog" aria-label="High memory warning">
      <div id="icon">⚠️</div>
      <div id="headline">Memory almost full</div>
      <div id="sub">Your computer may freeze. Close some apps or browser tabs.</div>
      <div id="actions">
        <button id="open" type="button">Open momPanel</button>
        <button id="dismiss" type="button">Dismiss</button>
      </div>
    </div>
    <script type="module" src="warn.js"></script>
  </body>
</html>
