name: AppImage Preview

# Ad-hoc Linux AppImage build for verifying a branch on a real Zorin/GNOME machine
# WITHOUT cutting a release. Uploads the AppImage as a workflow artifact (no GitHub
# Release, no version tag). Updater artifacts are disabled so no signing key is needed.
# Safe to delete once the branch is verified/merged.
on:
  workflow_dispatch:
  push:
    branches:
      - feat/linux-x11-transparency

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Build AppImage (no updater signing)
        run: npm run tauri build -- --bundles appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - uses: actions/upload-artifact@v4
        with:
          name: mompanel-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
